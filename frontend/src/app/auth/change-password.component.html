<div class="auth-shell">
  <div class="backdrop"></div>

  <section class="brand-panel" aria-hidden="true">
    <div class="logo-image">
      <img src="/assets/sisas.png?v=20260223" alt="SISAS - Sistema Integrado" />
    </div>
  </section>

  <section class="modal-layer">
    <div class="auth-card">
      <div class="card-header">
        <h1>Cambio de contraseña</h1>
        <p class="helper-text">
          Tu contraseña actual es temporal. Debes cambiarla antes de continuar en el sistema.
        </p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()">
        <label>
          Contraseña actual
          <div class="password-field">
            <input [type]="showCurrentPassword ? 'text' : 'password'" formControlName="current_password" />
            <button
              type="button"
              class="password-toggle"
              [attr.aria-label]="showCurrentPassword ? 'Ocultar contraseña' : 'Ver contraseña'"
              (click)="showCurrentPassword = !showCurrentPassword"
            >
              <img
                [src]="showCurrentPassword ? '/assets/password-lock.svg' : '/assets/password-unlock.svg'"
                [alt]="showCurrentPassword ? 'Bloquear contraseña' : 'Ver contraseña'"
              />
            </button>
          </div>
          <span class="field-error" *ngIf="form.controls.current_password.touched && form.controls.current_password.errors?.['required']">
            Debes ingresar la contraseña actual.
          </span>
        </label>
        <label>
          Nueva contraseña
          <div class="password-field">
            <input [type]="showNewPassword ? 'text' : 'password'" formControlName="new_password" />
            <button
              type="button"
              class="password-toggle"
              [attr.aria-label]="showNewPassword ? 'Ocultar contraseña' : 'Ver contraseña'"
              (click)="showNewPassword = !showNewPassword"
            >
              <img
                [src]="showNewPassword ? '/assets/password-lock.svg' : '/assets/password-unlock.svg'"
                [alt]="showNewPassword ? 'Bloquear contraseña' : 'Ver contraseña'"
              />
            </button>
          </div>
          <span class="field-error" *ngIf="form.controls.new_password.touched && form.controls.new_password.errors?.['required']">
            Debes ingresar una nueva contraseña.
          </span>
          <span class="field-error" *ngIf="form.controls.new_password.touched && form.controls.new_password.errors?.['minlength']">
            La nueva contraseña debe tener al menos 8 caracteres.
          </span>
        </label>
        <label>
          Confirmar nueva contraseña
          <div class="password-field">
            <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirm_password" />
            <button
              type="button"
              class="password-toggle"
              [attr.aria-label]="showConfirmPassword ? 'Ocultar contraseña' : 'Ver contraseña'"
              (click)="showConfirmPassword = !showConfirmPassword"
            >
              <img
                [src]="showConfirmPassword ? '/assets/password-lock.svg' : '/assets/password-unlock.svg'"
                [alt]="showConfirmPassword ? 'Bloquear contraseña' : 'Ver contraseña'"
              />
            </button>
          </div>
          <span class="field-error" *ngIf="form.controls.confirm_password.touched && form.controls.confirm_password.errors?.['required']">
            Debes confirmar la nueva contraseña.
          </span>
        </label>

        <span class="error" *ngIf="errorMessage">{{ errorMessage }}</span>

        <div class="actions">
          <button type="submit" [disabled]="isSubmitting">Guardar nueva contraseña</button>
          <button type="button" class="secondary-btn" (click)="logout()">Salir</button>
        </div>
      </form>
    </div>
  </section>
</div>
